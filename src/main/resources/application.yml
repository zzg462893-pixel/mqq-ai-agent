spring:
  application:
    name: mqq-ai-agent
  ai:
    dashscope:
      api-key: ${aliQwen-api}
      chat:
        options:
          model: qwen-plus
#      embedding:
#        options:
#          model: text-embedding-v3
    vectorstore:
      redis:
        # 索引配置
        index-name: love_app_vectors
        prefix: "love_app:"           # Key 前缀
        initialize-schema: true       # 自动初始化索引
        # 向量配置
        # vector-algorithm: FLAT        # 索引类型：FLAT 或 HNSW
        # distance-type: COSINE         # 距离类型：COSINE, L2, IP
        # dimensions: 1536              # 向量维度，dashscope text-embedding-v3 是 1536
        # initial-capacity: 1000        # 初始容量
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      connect-timeout: 3s
      timeout: 2s
      password: 123456

server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.mqq.agent.controller

# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

# searchApi
search-api:
  api-key: "2V6pZ2LXxd6ddsVMCXeivjm4"
